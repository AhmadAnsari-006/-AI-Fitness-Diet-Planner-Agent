{% extends 'base.html' %}

{% block title %}Login - Aura Fit{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card bg-dark-glass p-4 p-sm-5 border border-white-10 shadow-2xl rounded-4 relative">
            <div class="text-center mb-4">
                <i class="fa-solid fa-lock logo-icon mb-2 fs-2"></i>
                <h2 class="fw-bold text-white mb-1">Welcome Back</h2>
                <p class="text-secondary text-sm">Please log in to manage your fitness profiles</p>
            </div>
            
            <form action="{{ url_for('auth.login') }}" method="POST" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label text-secondary small fw-medium">Gmail / Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-glass-compact border border-white-10 text-secondary"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" name="email" id="email" class="form-control bg-glass-compact text-white border border-white-10" placeholder="e.g. janesmith@gmail.com" required>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label text-secondary small fw-medium">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-glass-compact border border-white-10 text-secondary"><i class="fa-solid fa-key"></i></span>
                        <input type="password" name="password" id="password" class="form-control bg-glass-compact text-white border border-white-10" placeholder="Enter password" required>
                    </div>
                </div>
                
                <div class="mb-4 d-flex justify-content-between align-items-center">
                    <div class="form-check">
                        <input class="form-check-input bg-glass-compact border-white-20" type="checkbox" name="remember" id="remember" checked>
                        <label class="form-check-label text-secondary small" for="remember">
                            Remember Me
                        </label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2.5 rounded-pill mb-3"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
            </form>
            
            <div class="text-center">
                <p class="text-secondary small mb-0">Don't have an account? <a href="{{ url_for('auth.signup') }}" class="text-primary fw-semibold text-decoration-none">Sign Up Here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
